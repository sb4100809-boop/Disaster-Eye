services:
  - type: web
    name: disaster-eye-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python -m gunicorn app:app
    envVars:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
